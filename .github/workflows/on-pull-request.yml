name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint:md

      - name: Lint Go
        run: npm run lint:go

      - name: Lint TypeScript
        run: npm run lint:ts

      - name: Lint CSS
        run: npm run lint:css

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: cd apps/frontend && npm test -- --coverage --testPathIgnorePatterns=integration

      - name: Check coverage
        run: |
          cd apps/frontend
          COVERAGE=$(npm test -- --coverage --coverageReporters=json-summary --testPathIgnorePatterns=integration 2>&1 | grep -o '"lines": *[0-9.]*' | grep -o '[0-9.]*' | head -1)
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Frontend coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "✓ Frontend coverage ${COVERAGE}% meets threshold"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/frontend/coverage/coverage-final.json
          flags: frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: sourcestream_test
          POSTGRES_USER: sourcestream_user
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U sourcestream_user; do
            sleep 1
          done
        env:
          PGPASSWORD: password

      - name: Run database migrations
        run: |
          cd apps/backend
          PGPASSWORD=password psql -h localhost -U sourcestream_user -d sourcestream_test -f migrations/001_initial_schema.sql || true
          PGPASSWORD=password psql -h localhost -U sourcestream_user -d sourcestream_test -f migrations/002_requests.sql || true
          PGPASSWORD=password psql -h localhost -U sourcestream_user -d sourcestream_test -f migrations/003_approved_projects.sql || true
        continue-on-error: true

      - name: Run tests
        run: cd apps/backend && go test -v -coverprofile=coverage.out ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: sourcestream_user
          DB_PASSWORD: password
          DB_NAME: sourcestream_test
          DB_SSLMODE: disable

      - name: Check coverage
        run: |
          cd apps/backend
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | sed 's/%//')
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Backend coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
          echo "✓ Backend coverage ${COVERAGE}% meets threshold"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/backend/coverage.out
          flags: backend

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: cd apps/frontend && npm run build

      - name: Build Backend
        run: cd apps/backend && go build -o ./bin/sourcestream-backend ./

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            apps/frontend/dist/
            apps/backend/bin/

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint, test-frontend, test-backend, build]
    if: always()
    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test-frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.test-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          echo "✅ All checks passed"
