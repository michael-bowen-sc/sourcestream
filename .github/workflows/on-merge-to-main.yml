name: Build & Deploy to Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
      frontend-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-images:
    name: Verify Docker Images
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Backend image
        run: |
          docker pull ${{ needs.build-images.outputs.backend-image }}
          echo "✓ Backend image verified: ${{ needs.build-images.outputs.backend-image }}"

      - name: Verify Frontend image
        run: |
          docker pull ${{ needs.build-images.outputs.frontend-image }}
          echo "✓ Frontend image verified: ${{ needs.build-images.outputs.frontend-image }}"

  deployment-status:
    name: Deployment Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build-images, verify-images]
    steps:
      - name: Generate deployment summary
        env:
          BACKEND_IMAGE: ${{ needs.build-images.outputs.backend-image }}
          FRONTEND_IMAGE: ${{ needs.build-images.outputs.frontend-image }}
        run: |
          cat << 'EOF'
          ✅ Docker Images Built & Pushed to GHCR

          Image Details:
          --------
          Backend:  ${{ env.BACKEND_IMAGE }}
          Frontend: ${{ env.FRONTEND_IMAGE }}
          Registry: ghcr.io/${{ github.repository }}

          Available Tags:
          --------
          - ${{ github.sha }} (commit SHA)
          - latest (if on main branch)
          - main (branch name)

          Next Steps:
          --------
          1. Configure Kubernetes cluster access (if not done):
             - Add K8S_KUBECONFIG or K8S_TOKEN to GitHub Secrets

          2. Create staging deployment script:
             - scripts/deploy/staging.sh

          3. Uncomment deployment job in this workflow

          See: docs/deployment.md for detailed configuration

          View Images:
          --------
          https://github.com/${{ github.repository }}/pkgs/container
          EOF
