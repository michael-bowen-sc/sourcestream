name: Build & Deploy to Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build Docker images with improved caching
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
      image-latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Backend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
      image-latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Frontend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Verify images in parallel
  verify-backend:
    name: Verify Backend Image
    runs-on: ubuntu-latest
    needs: build-backend
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Backend image
        run: |
          docker pull ${{ needs.build-backend.outputs.image }}
          echo "✓ Backend image verified: ${{ needs.build-backend.outputs.image }}"

          # Get image info
          docker inspect ${{ needs.build-backend.outputs.image }} | jq '.[0].Architecture, .[0].Os'

  verify-frontend:
    name: Verify Frontend Image
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Frontend image
        run: |
          docker pull ${{ needs.build-frontend.outputs.image }}
          echo "✓ Frontend image verified: ${{ needs.build-frontend.outputs.image }}"

          # Get image info
          docker inspect ${{ needs.build-frontend.outputs.image }} | jq '.[0].Architecture, .[0].Os'

  # Generate deployment summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build-backend, build-frontend, verify-backend, verify-frontend]
    steps:
      - name: Generate deployment summary
        env:
          BACKEND_IMAGE: ${{ needs.build-backend.outputs.image }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.image }}
          BUILD_BACKEND_STATUS: ${{ needs.build-backend.result }}
          BUILD_FRONTEND_STATUS: ${{ needs.build-frontend.result }}
          VERIFY_BACKEND_STATUS: ${{ needs.verify-backend.result }}
          VERIFY_FRONTEND_STATUS: ${{ needs.verify-frontend.result }}
        run: |
          echo "📋 Deployment Status Summary"
          echo "=========================================="
          echo ""

          # Check if all jobs succeeded
          if [[ "$BUILD_BACKEND_STATUS" == "success" ]] && \
             [[ "$BUILD_FRONTEND_STATUS" == "success" ]] && \
             [[ "$VERIFY_BACKEND_STATUS" == "success" ]] && \
             [[ "$VERIFY_FRONTEND_STATUS" == "success" ]]; then
            echo "✅ All Docker images built and verified successfully"
            echo ""
            echo "Image Details:"
            echo "--------"
            echo "Backend:  $BACKEND_IMAGE"
            echo "Frontend: $FRONTEND_IMAGE"
            echo ""
            echo "Available Tags:"
            echo "--------"
            echo "- ${{ github.sha }} (commit SHA)"
            echo "- latest (main branch)"
            echo "- main (branch name)"
            echo ""
            echo "Registry: ghcr.io/${{ github.repository }}"
            echo ""
            echo "View Images:"
            echo "--------"
            echo "https://github.com/${{ github.repository }}/pkgs/container"
          else
            echo "❌ One or more build/verify jobs failed"
            echo ""
            echo "Build Backend:   $BUILD_BACKEND_STATUS"
            echo "Build Frontend:  $BUILD_FRONTEND_STATUS"
            echo "Verify Backend:  $VERIFY_BACKEND_STATUS"
            echo "Verify Frontend: $VERIFY_FRONTEND_STATUS"
            exit 1
          fi
