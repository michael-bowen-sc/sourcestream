name: Production Deployment with Approval

on:
  # Triggered manually or by release creation
  workflow_dispatch:
    inputs:
      version:
        description: 'Deployment version (e.g., v1.2.3)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push Docker images
  build-production-images:
    name: Build Production Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
      frontend-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          labels: |
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          labels: |
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Run security scan on images
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-production-images
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-production-images.outputs.backend-image }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

  # Approval gate - wait for manual approval
  approval-gate:
    name: Deployment Approval
    runs-on: ubuntu-latest
    needs: [build-production-images, security-scan]
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: https://sourcestream.${{ github.event.inputs.environment || 'staging' }}.example.com
    steps:
      - name: Approve deployment
        run: |
          echo "✅ Deployment approved for ${{ github.event.inputs.environment || 'staging' }}"
          echo ""
          echo "Backend Image: ${{ needs.build-production-images.outputs.backend-image }}"
          echo "Frontend Image: ${{ needs.build-production-images.outputs.frontend-image }}"
          echo ""
          echo "Deploying to environment: ${{ github.event.inputs.environment || 'staging' }}"

  # Deploy to environment
  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: [build-production-images, approval-gate]
    permissions:
      contents: read
      packages: read
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ github.event.inputs.environment || 'staging' }}',
              description: 'Automated production deployment',
              auto_merge: false,
              required_contexts: [],
              production_environment: true
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Update deployment status - in progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deployment in progress...'
            });

      - name: Deploy with kubectl
        run: |
          # This is a placeholder for actual deployment
          # In production, this would:
          # 1. Configure kubectl with cluster credentials
          # 2. Update image references in Kubernetes manifests
          # 3. Apply manifests to cluster
          # 4. Wait for rollout to complete

          echo "Deploying to ${{ github.event.inputs.environment || 'staging' }}"
          echo "Backend: ${{ needs.build-production-images.outputs.backend-image }}"
          echo "Frontend: ${{ needs.build-production-images.outputs.frontend-image }}"

          # Example commands:
          # kubectl set image deployment/backend \
          #   backend=${{ needs.build-production-images.outputs.backend-image }} \
          #   -n sourcestream-${{ github.event.inputs.environment || 'staging' }}
          #
          # kubectl rollout status deployment/backend \
          #   -n sourcestream-${{ github.event.inputs.environment || 'staging' }} \
          #   --timeout=5m

      - name: Update deployment status - success
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Deployment completed successfully',
              environment_url: 'https://sourcestream.${{ github.event.inputs.environment || 'staging' }}.example.com'
            });

      - name: Update deployment status - failure
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed'
            });

  # Post-deployment verification
  post-deployment-checks:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: |
          echo "✅ Post-deployment health checks"
          echo "- API health: OK"
          echo "- Database connectivity: OK"
          echo "- Frontend availability: OK"

          # In production, this would:
          # 1. Call health endpoints
          # 2. Run smoke tests
          # 3. Verify database migrations
          # 4. Check logging and monitoring

      - name: Send deployment notification
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚀 Deployment Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*: ${{ job.status }}\n*Environment*: ${{ github.event.inputs.environment || 'staging' }}\n*Version*: ${{ github.sha }}"
                  }
                }
              ]
            }

  # Automated rollback on failure
  rollback:
    name: Automated Rollback
    runs-on: ubuntu-latest
    needs: [deploy, post-deployment-checks]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Trigger rollback
        run: |
          echo "⚠️ Deployment failed, initiating rollback..."

          # In production, this would:
          # 1. Revert to previous stable image
          # 2. Monitor rollback progress
          # 3. Notify team of failure
          # 4. Create incident ticket

      - name: Send failure notification
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Deployment Failed - Rollback Initiated",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*: FAILED\n*Environment*: ${{ github.event.inputs.environment || 'staging' }}\n*Action*: Automatic rollback initiated"
                  }
                }
              ]
            }
