apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: sourcestream-staging
  labels:
    app: backend
    component: api
spec:
  # Ensure at least 1 pod remains available during disruptions
  # This prevents complete outage during node maintenance
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
      component: api
  # Prevent voluntary disruptions for these pod controllers
  unhealthyPodEvictionPolicy: IfHealthyBudget
