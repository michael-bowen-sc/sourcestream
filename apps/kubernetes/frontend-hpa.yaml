apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: sourcestream-staging
  labels:
    app: frontend
    component: web
spec:
  # Target the frontend deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend

  # Scale between 2 and 5 replicas (frontend is stateless and lighter)
  minReplicas: 2
  maxReplicas: 5

  # Scale based on multiple metrics
  metrics:
    # Scale based on CPU utilization (70% threshold)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale based on memory utilization (80% threshold)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # Scaling behavior for gradual adjustments
  behavior:
    # Scale up moderately (30% increase every 30s if needed)
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 30
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 30
      selectPolicy: Max

    # Scale down conservatively (decrease slowly)
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
