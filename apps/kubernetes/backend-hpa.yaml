apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: sourcestream-staging
  labels:
    app: backend
    component: api
spec:
  # Target the backend deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend

  # Scale between 2 and 8 replicas
  minReplicas: 2
  maxReplicas: 8

  # Scale based on multiple metrics
  metrics:
    # Scale based on CPU utilization (80% threshold)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

    # Scale based on memory utilization (75% threshold)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  # Scaling behavior for gradual adjustments
  behavior:
    # Scale up aggressively (double every 60s if needed)
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

    # Scale down conservatively (decrease slowly)
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
