kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sourcestream

nodes:
  # Control plane node
  - role: control-plane
    extraPortMappings:
      # HTTP
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Backend gRPC Gateway
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
      # Backend gRPC
      - containerPort: 50051
        hostPort: 50051
        protocol: TCP

  # Worker nodes
  - role: worker
  - role: worker

# Configure containerd for local image loading
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
      endpoint = ["http://localhost:5000"]

# Enable feature gates if needed
featureGates:
  EphemeralContainers: true
