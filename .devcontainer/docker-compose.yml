version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: sourcestream-devcontainer:latest
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - devcontainer-node-modules:/workspace/node_modules
      - devcontainer-go-modules:/go/pkg/mod
    environment:
      - NODE_ENV=development
      - GOPATH=/go
      - GOROOT=/usr/local/go
    command: sleep infinity
    networks:
      - sourcestream

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: sourcestream_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sourcestream
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sourcestream
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcestream_user -d sourcestream"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  devcontainer-node-modules:
  devcontainer-go-modules:
  postgres-data:

networks:
  sourcestream:
    driver: bridge
